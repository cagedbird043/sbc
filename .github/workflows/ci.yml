name: CI

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.26"
          check-latest: true
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build -o /dev/null .
